# _config.yml

# Build settings
remote_theme: "alshedivat/al-folio"
plugins:
  - jekyll-include-cache
  # - jekyll-sitemap
  # - jekyll-paginate

include: ["_pages", "_posts"]

# Site Settings
title: "Himon's Website"
subtitle: "About me, things I like, and what I am or was up to."
# masterhead_title: "Himon Thakur"
name: &name "Himon Thakur"
first_name: "Himon"
last_name: "Thakur"
description: "A website made by Himon Thakur"

encoding: "utf-8"
timezone: "America/Denver"
url: "https://himonthakur.github.io"
# baseurl: "/home"
repository: "himonthakur/himonthakur.github.io"

locale: "en-US"

social:
  name: "Himon Thakur"
  links:
    - https://github.com/himonthakur
    - https://www.linkedin.com/in/himonthakur/
    - https://scholar.google.com/citations?user=dXITneMAAAAJ&hl=en
    - https://orcid.org/0000-0003-2345-6789

# Author Profile
author:
  name: *name
  avatar: "/assets/images/profile.jpg"
  bio: "MSCS@UCCS | PhD aspirant | I like coffee, cats and rain"
  location: "Colorado Springs, CO"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/himonthakur"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/himonthakur/"
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.com/citations?user=dXITneMAAAAJ&hl=en"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0003-2345-6789"

atom_feed:
  hide: true

footer:
