# _config.yml


# Build settings
remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-gist
  - jekyll-responsive-image
  - jekyll-redirect-from
  - jekyll-commonmark


markdown: CommonMark
timezone: "America/Denver"


include: ["_pages", "_posts"]


# Site Settings
locale: "en-US"
encoding: "utf-8"
css_inline: true
atom_feed:
  hide: true


title: "Himon's Website"
subtitle: "About me, things I like, and what I am or was up to."
description: "A website made by Himon Thakur"

name: &name "Himon Thakur"
first_name: "Himon"
last_name: "Thakur"

url: "https://himonthakur.github.io"
baseurl: ""
repository: "himonthakur/himonthakur.github.io"


social:
  name: "Himon Thakur"
  links:
    - https://github.com/himonthakur
    - https://www.linkedin.com/in/himonthakur/
    - https://scholar.google.com/citations?user=dXITneMAAAAJ&hl=en
    - https://orcid.org/0000-0003-2345-6789


# Author Profile
author:
  name: *name
  avatar: "/assets/images/profile.jpg"
  bio: "Doing my master's. Want to do a PhD.I like coffee, cats and rain."
  links:
    - label: "Someday I'll update my projects"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/himonthakur"
    - label: "I wish I could leave LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/himonthakur/"
    - label: "Can I has citations?"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.com/citations?user=dXITneMAAAAJ&hl=en"
    - label: "My ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0003-2345-6789"
  location: "Colorado Springs, CO"


# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/himonthakur"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/himonthakur/"
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.com/citations?user=_4UA7RsAAAAJ"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/0000-0003-4230-9439"
